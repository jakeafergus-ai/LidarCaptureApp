name: LidarCaptureApp
options:
  bundleIdPrefix: com.jakefergus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    DEVELOPMENT_TEAM: ""

targets:
  LidarCaptureApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Sources/App/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "This app needs camera access to capture synchronized video and LiDAR depth for 3D reconstruction."
        NSMotionUsageDescription: "This app records device motion (accelerometer/gyro) alongside video to help align captured footage for 3D reconstruction."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIRequiresFullScreen: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jakefergus.lidarcaptureapp
        PRODUCT_NAME: LidarCaptureApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - LidarCaptureAppTests

  LidarCaptureAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LidarCaptureAppTests
    dependencies:
      - target: LidarCaptureApp
